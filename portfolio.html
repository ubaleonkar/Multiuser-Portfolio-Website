<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="name"></h1>
<h3>Skills:</h3>
<ul id="skills"></ul>

<h3>Projects:</h3>
<ul id="projects"></ul>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {
    let id = localStorage.getItem("memberId");
    let member = data.find(m => m.id == id);

    document.getElementById("name").innerText = member.name;

    member.skills.forEach(skill => {
        let li = document.createElement("li");
        li.innerText = skill;
        document.getElementById("skills").appendChild(li);
    });

    member.projects.forEach(project => {
        let li = document.createElement("li");
        li.innerText = project;
        document.getElementById("projects").appendChild(li);
    });
});
</script>

</body>
</html>
